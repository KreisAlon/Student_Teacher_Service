<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exam App </title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary fw-bold mb-0">Teacher Dashboard</h2>
            <button id="logoutBtn" class="btn btn-outline-secondary fw-bold">
                התנתק
            </button>
        </div>
        <div class="row">

            <!-- LEFT SIDE: CREATE EXAM -->
            <div class="col-md-5">

                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        Create Exam
                    </div>

                    <div class="card-body">

                        <div class="mb-3">
                            <label class="form-label">Exam Title</label>
                            <input id="examTitle" type="text" class="form-control"
                                placeholder="Example: JavaScript Basics">
                        </div>

                        <hr>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="examDescription" class="form-control" rows="2"
                                placeholder="Brief description of the exam..."></textarea>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Category</label>
                                <input type="text" id="examCategory" class="form-control"
                                    placeholder="e.g., Math, History...">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Exam Code</label>
                                <input type="text" id="examCode" class="form-control" placeholder="e.g., MAT101">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Time Limit (Minutes)</label>
                                <input type="number" id="examTime" class="form-control" min="0"
                                    placeholder="0 for unlimited">
                            </div>
                        </div>

                        <h5>Add Question</h5>

                        <div class="mb-3">
                            <label class="form-label">Question Text</label>
                            <input id="questionText" type="text" class="form-control"
                                placeholder="Example: What is const?">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Answer 1</label>
                            <input id="answer1" type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Answer 2</label>
                            <input id="answer2" type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Answer 3</label>
                            <input id="answer3" type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Answer 4</label>
                            <input id="answer4" type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correct Answer Number</label>
                            <input id="correctAnswer" type="number" class="form-control" min="1" max="4"
                                placeholder="1-4">
                        </div>

                        <button id="addQuestionBtn" class="btn btn-success w-100 mb-2">
                            Add Question
                        </button>

                        <button id="saveExamBtn" class="btn btn-primary w-100">
                            Save Exam
                        </button>

                        <div id="builderMessage" class="mt-3"></div>

                    </div>
                </div>

            </div>

            <!-- RIGHT SIDE: SAVED EXAMS -->
            <div class="col-md-7">

                <div class="card mb-4">
                    <div class="card-header bg-dark text-white">
                        Saved Exams
                    </div>

                    <div class="card-body">
                        <div id="examList"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-warning">
                        Run Exam
                    </div>

                    <div class="card-body">
                        <div id="examRunner">
                            <p class="text-muted">Choose an exam to run.</p>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Main JavaScript file -->
    <script type="module" src="js/teacher.js"></script>

</body>

</html>
