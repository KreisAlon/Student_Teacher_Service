<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>לוח בקרה - סטודנט</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand">
                לוח בקרה לסטודנט <span id="studentNameGreeting"></span>
            </span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">התנתק</button>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card shadow-sm text-center border-0">
                    <div class="card-body">
                        <h5 class="card-title text-muted">ממוצע ציונים</h5>
                        <h2 class="text-success fw-bold display-4" id="averageGradeDisplay">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">חיפוש וביצוע מבחן</h5>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <input type="text" id="searchInput" class="form-control"
                                placeholder="חפש לפי שם מבחן או קוד (למשל: MAT101)...">
                        </div>
                        <div id="availableExams">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">היסטוריית מבחנים וציונים</h5>
                    </div>
                    <div class="card-body" id="examHistory">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/student.js"></script>
</body>

</html>
