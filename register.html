<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>הרשמה למערכת המבחנים</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container py-5" style="max-width: 500px;">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">
                <h3>הרשמה למערכת</h3>
            </div>
            <div class="card-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">תעודת זהות</label>
                        <input type="text" id="idInput" class="form-control" required placeholder="הכנס תעודת זהות">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">שם משתמש</label>
                        <input type="text" id="usernameInput" class="form-control" required placeholder="לדוגמה: Alon">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">סיסמה</label>
                        <input type="password" id="passwordInput" class="form-control" required placeholder="בחר סיסמה">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">סוג משתמש</label>
                        <select id="roleInput" class="form-select" required>
                            <option value="" disabled selected>בחר תפקיד...</option>
                            <option value="student">סטודנט</option>
                            <option value="teacher">מורה</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">הרשם עכשיו</button>
                    <div id="messageBox"></div>
                </form>
                <div class="text-center">
                    <a href="login.html">כבר יש לך חשבון? התחבר כאן</a>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/register.js"></script>
</body>

</html>
