<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>התחברות - מערכת מבחנים</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container py-5" style="max-width: 500px;">
        <div class="card">
            <div class="card-header bg-success text-white text-center">
                <h3>התחברות</h3>
            </div>
            <div class="card-body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">שם משתמש או תעודת זהות</label>
                        <input type="text" id="usernameInput" class="form-control" required
                            placeholder="הכנס שם משתמש או ת.ז">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">סיסמה</label>
                        <input type="password" id="passwordInput" class="form-control" required
                            placeholder="הכנס סיסמה">
                    </div>
                    <button type="submit" class="btn btn-success w-100 mb-3">התחבר</button>
                    <div id="messageBox"></div>
                </form>
                <div class="text-center">
                    <a href="register.html">משתמש חדש? לחץ כאן להרשמה</a>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/login.js"></script>
</body>

</html>
