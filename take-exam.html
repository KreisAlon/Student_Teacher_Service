<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ביצוע מבחן</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand">מערכת מבחנים - ביצוע מבחן</span>
            <a href="student.html" class="btn btn-outline-light btn-sm">ביטול וחזרה ללוח הבקרה</a>
        </div>
    </nav>

    <div class="container" style="max-width: 800px;">
        <div class="card shadow-sm mb-5">
            <div class="card-header bg-white py-3">
                <h3 id="examTitleDisplay" class="mb-0 text-primary">טוען מבחן...</h3>
                <p id="examDescDisplay" class="text-muted mb-0 mt-2"></p>
            </div>

            <div class="card-body bg-light p-4">
                <form id="examForm">
                    <div id="questionsContainer">
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-4 fs-5 py-2 fw-bold">
                        סיים והגש מבחן
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="js/take-exam.js"></script>
</body>

</html>
